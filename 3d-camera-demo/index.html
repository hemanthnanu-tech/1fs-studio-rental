<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Interactive Camera Prototype</title>
  <link rel="stylesheet" href="style.css" />
  
  <!-- Three.js (r128) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <!-- GSAP Core & ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
  
  <!-- Fixed WebGL Canvas Container -->
  <div id="canvas-container"></div>

  <!-- Scrollable Overlay Content -->
  <div class="scroll-content">
    <section class="screen">
      <div class="text-block text-left">
        <h1 class="gradient-text">Capture Reality</h1>
        <p>Scroll down to explore the engineering behind the lens.</p>
      </div>
    </section>
    
    <section class="screen">
      <div class="text-block text-right">
        <h2 class="gradient-text">Precision Optics</h2>
        <p>Every glass element meticulously crafted for supreme clarity.</p>
      </div>
    </section>

    <section class="screen">
      <div class="text-block text-center">
        <h2 class="gradient-text">Ready to Shoot?</h2>
        <p>Book your gear today.</p>
      </div>
    </section>
  </div>

  <script src="main.js"></script>
</body>
</html>
